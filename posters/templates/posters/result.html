<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 결과</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f5f5f5; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .info-group { margin-bottom: 1.5rem; }
        .label { font-weight: bold; color: #666; font-size: 0.9rem; }
        .value { font-size: 1.1rem; color: #222; margin-top: 5px; }
        .btn { display: inline-block; width: 100%; padding: 12px; background-color: #007bff; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 1rem; }
        .btn:hover { background-color: #0056b3; }
        .preview-img { width: 100%; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🗓️ 일정 추출 완료</h2>
        
        {% if event.image %}
            <img src="{{ event.image.url }}" alt="포스터" class="preview-img">
        {% endif %}

        <div class="info-group">
            <div class="label">행사명</div>
            <div class="value">{{ event.event_name }}</div>
        </div>

        <div class="info-group">
            <div class="label">기간</div>
            <div class="value">{{ event.start_date|date:"Y년 m월 d일" }} ~ {{ event.end_date|date:"Y년 m월 d일" }}</div>
        </div>

        <div class="info-group">
            <div class="label">상세 설명</div>
            <div class="value">{{ event.description|linebreaks }}</div>
        </div>

        <a href="{% url 'upload_page' %}" class="btn">새 이미지 추가하기</a>
    </div>
</body>
</html>
